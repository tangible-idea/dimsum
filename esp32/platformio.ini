; 클리커 키우기 - PlatformIO 설정 예시
; 기존 프로젝트에 Poke 모듈을 더할 때 참고. Poke.h / Poke.cpp 를 src/ 에 둔다.
;
; 자격증명은 여기 직접 쓰지 말고 secrets.ini 로 분리해 .gitignore 하는 걸 권장.
; (아래 extra_configs + ${secrets.*} 참고)

[platformio]
; extra_configs = secrets.ini   ; ← 자격증명 분리 시 주석 해제

[env:esp32-clicker]
platform = espressif32
board = esp32-c3-devkitm-1        ; 실제 보드에 맞게 변경
framework = arduino
monitor_speed = 115200

lib_deps =
    t-vk/ESP32 BLE Keyboard       ; 기존 BLE 키보드
    olikraus/U8g2                 ; 기존 디스플레이

build_flags =
    ; ---- 디스플레이/핀 (기존 설정 유지) ----
    -D DISPLAY_SDA_PIN=5
    -D DISPLAY_SCL_PIN=6
    -D LED_PIN=4
    ; ---- Poke (WiFi) 자격증명 ----
    ; 직접 값 대신 secrets.ini 사용 시: -D WIFI_SSID=\"${secrets.wifi_ssid}\" 형태로
    -D WIFI_SSID=\"YOUR_WIFI\"
    -D WIFI_PASS=\"YOUR_WIFI_PASSWORD\"
    -D SUPABASE_URL=\"https://YOUR-PROJECT.supabase.co\"
    -D SUPABASE_ANON_KEY=\"YOUR_SUPABASE_ANON_KEY\"
    -D DEVICE_CODE=\"DSJA-JD49XXXX\"
    -D DEVICE_SECRET=\"등록시-발급받은-uuid\"
    ; ---- Poke 동작 옵션 (선택) ----
    -D POKE_POLL_INTERVAL_MS=2000

; --- secrets.ini 예시 (별도 파일, git 제외) ---
; [secrets]
; wifi_ssid = YOUR_WIFI
; wifi_pass = YOUR_WIFI_PASSWORD
; device_secret = 등록시-발급받은-uuid
