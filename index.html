<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>픽셀 딤섬 클리커</title>
<style>
  :root {
    --bg0: #1a1330;
    --bg1: #0f0a22;
    --panel: rgba(46, 33, 82, 0.82);
    --panel2: rgba(60, 44, 104, 0.7);
    --gold: #ffd24a;
    --gold-soft: #ffe89a;
    --text: #efe9ff;
    --muted: #b7a9e0;
    --accent: #ff8a3d;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; margin: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Apple SD Gothic Neo', 'Pretendard', sans-serif;
    color: var(--text);
    background: radial-gradient(120% 100% at 50% 0%, var(--bg0) 0%, var(--bg1) 70%);
    overflow: hidden;
    user-select: none;
  }
  .stars { position: fixed; inset: 0; overflow: hidden; pointer-events: none; z-index: 0; }
  .star { position: absolute; width: 2px; height: 2px; border-radius: 50%; background: #fff; opacity: .7; animation: tw 3s infinite ease-in-out; }
  @keyframes tw { 0%,100% { opacity: .2; } 50% { opacity: .9; } }

  .app { position: relative; z-index: 1; height: 100%; display: flex; flex-direction: column; }

  .news {
    flex: 0 0 auto; height: 34px; display: flex; align-items: center;
    background: rgba(0,0,0,.25); border-bottom: 1px solid rgba(255,255,255,.06);
    overflow: hidden; font-size: 13px; color: var(--gold-soft);
  }
  .news span { white-space: nowrap; padding-left: 100%; animation: marquee 18s linear infinite; }
  @keyframes marquee { to { transform: translateX(-100%); } }

  .game { flex: 1 1 auto; display: flex; min-height: 0; }

  .left { flex: 1 1 auto; position: relative; display: flex; flex-direction: column; align-items: center; padding: 14px 12px 0; min-width: 0; }
  .title { margin: 4px 0 2px; font-size: clamp(18px, 3.4vw, 30px); font-weight: 800; color: var(--gold); text-shadow: 0 2px 0 rgba(0,0,0,.3); letter-spacing: 1px; }
  .level { color: var(--muted); font-size: 14px; }
  .progress { width: min(360px, 70%); height: 8px; border-radius: 99px; background: rgba(255,255,255,.12); margin: 8px 0 4px; overflow: hidden; }
  .progress > div { height: 100%; width: 0; background: linear-gradient(90deg, var(--accent), var(--gold)); transition: width .2s; }
  .progressText { font-size: 12px; color: var(--muted); }

  .coin { display: flex; align-items: center; gap: 8px; margin-top: 14px; font-size: clamp(34px, 7vw, 60px); font-weight: 900; color: #fff; text-shadow: 0 3px 0 rgba(0,0,0,.25); }
  .coin .ic { font-size: .85em; filter: drop-shadow(0 2px 2px rgba(0,0,0,.3)); }
  #coins.pop { animation: pop .22s ease-out; }
  @keyframes pop { 0% { transform: scale(1.35); } 100% { transform: scale(1); } }
  .persec { color: var(--gold-soft); font-size: 15px; margin-top: 2px; }

  .stage { flex: 1 1 auto; width: 100%; position: relative; min-height: 0; cursor: pointer; }
  #char { position: absolute; inset: 0; width: 100%; height: 100%; }

  .combo { position: absolute; bottom: 16px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,.3); border: 1px solid rgba(255,140,60,.5); color: #ffb37a; padding: 6px 14px; border-radius: 99px; font-size: 13px; font-weight: 700; }

  .shop { flex: 0 0 340px; max-width: 42vw; background: var(--panel); border-left: 1px solid rgba(255,255,255,.08); display: flex; flex-direction: column; }
  .shopHead { display: flex; align-items: center; justify-content: space-between; padding: 12px 14px; font-weight: 800; color: var(--gold); font-size: 18px; border-bottom: 1px solid rgba(255,255,255,.08); }
  .tabs { display: flex; flex-wrap: wrap; gap: 4px; padding: 8px; }
  .tab { flex: 1 1 auto; padding: 7px 6px; border-radius: 8px; background: transparent; color: var(--muted); border: none; font-size: 13px; font-weight: 700; cursor: pointer; }
  .tab.active { background: var(--panel2); color: #fff; box-shadow: inset 0 0 0 1px rgba(255,210,74,.5); }

  .buymodes { display: flex; gap: 6px; padding: 0 10px 8px; }
  .bm { flex: 1; padding: 8px; border-radius: 8px; border: 1px solid rgba(255,210,74,.35); background: transparent; color: var(--gold-soft); font-weight: 800; cursor: pointer; font-size: 13px; }
  .bm.active { background: var(--gold); color: #2a1d00; border-color: var(--gold); }

  .items { flex: 1 1 auto; overflow-y: auto; padding: 0 10px 12px; }
  .item { display: flex; gap: 10px; align-items: center; padding: 11px; border-radius: 12px; background: var(--panel2); margin-bottom: 8px; border: 1px solid rgba(255,255,255,.06); cursor: pointer; transition: transform .08s, filter .1s; }
  .item:active { transform: scale(.985); }
  .item.locked { opacity: .55; }
  .item.afford { box-shadow: 0 0 0 1px rgba(255,210,74,.55), 0 4px 14px rgba(255,180,60,.12); }
  .item .emoji { width: 46px; height: 46px; flex: 0 0 auto; display: grid; place-items: center; font-size: 30px; background: rgba(0,0,0,.22); border-radius: 10px; }
  .item .body { flex: 1 1 auto; min-width: 0; }
  .item .name { font-weight: 800; font-size: 15px; display: flex; justify-content: space-between; gap: 8px; }
  .item .name .cnt { color: var(--gold); }
  .item .desc { font-size: 11.5px; color: var(--muted); margin: 2px 0 4px; line-height: 1.3; }
  .item .cost { font-size: 13px; font-weight: 800; color: var(--gold-soft); }
  .item .cost.no { color: #ff8a8a; }

  .placeholder { padding: 40px 16px; text-align: center; color: var(--muted); font-size: 14px; }

  .stats { flex: 0 0 auto; padding: 10px 14px; border-top: 1px solid rgba(255,255,255,.08); font-size: 12px; color: var(--muted); line-height: 1.7; }
  .stats b { color: var(--text); }

  .toast { position: fixed; left: 50%; top: 56px; transform: translateX(-50%) translateY(-12px); background: rgba(20,12,40,.95); border: 1px solid var(--gold); color: var(--gold-soft); padding: 10px 16px; border-radius: 12px; font-size: 14px; font-weight: 700; opacity: 0; transition: all .3s; z-index: 5; pointer-events: none; }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  @media (max-width: 720px) {
    .game { flex-direction: column; }
    .shop { flex: 1 1 auto; max-width: none; border-left: none; border-top: 1px solid rgba(255,255,255,.08); }
    .stage { min-height: 180px; }
  }
</style>
</head>
<body>
  <div class="stars" id="stars"></div>
  <div class="toast" id="toast"></div>
  <div class="app">
    <div class="news"><span id="newsText"></span></div>
    <div class="game">
      <div class="left">
        <div class="title">🥟 픽셀 딤섬 클리커</div>
        <div class="level" id="levelName">Lv.1 아기 딤섬</div>
        <div class="progress"><div id="progressBar"></div></div>
        <div class="progressText" id="progressText"></div>
        <div class="coin"><span class="ic">🪙</span><span id="coins">0</span></div>
        <div class="persec" id="persec">초당 0 코인</div>
        <div class="stage" id="stage"><canvas id="char"></canvas></div>
        <div class="combo" id="combo">🔥 클릭 x1.0</div>
      </div>
      <aside class="shop">
        <div class="shopHead"><span>★ 상점 ★</span><span class="shopIcons">⚙️</span></div>
        <div class="tabs" id="tabs"></div>
        <div class="buymodes" id="buyModes"></div>
        <div class="items" id="items"></div>
        <div class="stats" id="stats"></div>
      </aside>
    </div>
  </div>
<script>
(() => {
'use strict';

// ====== 데이터 ======
const SAVE_KEY = 'dumpling-clicker-v1';

const GENS = [
  { name: '만두 친구',   emoji: '🥟', desc: '데굴데굴 코인을 모아요',        base: 15,      prod: 0.1 },
  { name: '찐빵 고양이', emoji: '🐱', desc: '낮잠 자면서도 코인을 벌어요',  base: 100,     prod: 1 },
  { name: '왕만두',     emoji: '🥠', desc: '큼직하게 코인을 벌어와요',      base: 1100,    prod: 8 },
  { name: '샤오롱바오', emoji: '🍲', desc: '육즙처럼 코인이 흘러나와요',    base: 12000,   prod: 47 },
  { name: '딤섬 셰프',  emoji: '👨‍🍳', desc: '쉴 새 없이 딤섬을 빚어요',     base: 130000,  prod: 260 },
  { name: '전설의 찜기', emoji: '♨️', desc: '전설급 생산량을 자랑해요',     base: 1400000, prod: 1400 },
];

const LEVEL_NAMES = ['아기 딤섬', '말랑 딤섬', '포동 딤섬', '윤기 딤섬', '황금 딤섬', '전설 딤섬', '신화 딤섬', '우주 딤섬'];

const NEWS = [
  '딤섬 뉴스 — "클릭은 사랑의 언어일지도."',
  '딤섬 뉴스 — 찜기 온도 100도 돌파, 김이 모락모락!',
  '딤섬 뉴스 — 만두 친구들이 야근을 자처했다고 합니다.',
  '딤섬 뉴스 — 오늘의 운세: 클릭할수록 부자가 됩니다.',
  '딤섬 뉴스 — 샤오롱바오, 육즙 보존의 비밀 공개?',
];

let S = {
  coins: 0,
  totalEarned: 0,
  totalClicks: 0,
  clickLevel: 0,
  gens: GENS.map(() => 0),
  lastSave: Date.now(),
};

let buyMode = 1;       // 1 | 10 | 'MAX'
let activeTab = 'friends';

// ====== 유틸 ======
function fmt(n) {
  if (n < 1000) return (Math.round(n * 10) / 10).toString();
  const units = ['', 'K', 'M', 'B', 'T', 'aa', 'bb', 'cc'];
  let u = 0;
  while (n >= 1000 && u < units.length - 1) { n /= 1000; u++; }
  return n.toFixed(2) + units[u];
}
function clickPower() { return 1 + S.clickLevel; }
function perSec() { return GENS.reduce((s, g, i) => s + g.prod * S.gens[i], 0); }
function genCost(i, owned) { return Math.floor(GENS[i].base * Math.pow(1.15, owned)); }
function costOf(i, k) {
  let total = 0;
  for (let j = 0; j < k; j++) total += genCost(i, S.gens[i] + j);
  return total;
}
function maxBuy(i) {
  let coins = S.coins, n = 0;
  while (n < 100000) {
    const c = genCost(i, S.gens[i] + n);
    if (coins >= c) { coins -= c; n++; } else break;
  }
  return n;
}
function clickUpgradeCost() { return Math.floor(25 * Math.pow(1.6, S.clickLevel)); }

function levelInfo() {
  let lvl = 1, need = 50, acc = 0;
  while (S.totalEarned >= acc + need && lvl < 999) { acc += need; lvl++; need = Math.floor(need * 1.55); }
  return { lvl, cur: S.totalEarned - acc, need };
}

// ====== 콤보 ======
let combo = 1;            // 1.0 ~ 2.5
let comboDecay = 0;

// ====== 저장 / 불러오기 ======
function save() {
  S.lastSave = Date.now();
  try { localStorage.setItem(SAVE_KEY, JSON.stringify(S)); } catch (e) {}
}
function load() {
  try {
    const raw = localStorage.getItem(SAVE_KEY);
    if (!raw) return;
    const d = JSON.parse(raw);
    S = Object.assign(S, d);
    if (!Array.isArray(S.gens) || S.gens.length !== GENS.length) S.gens = GENS.map(() => 0);
    // 오프라인 수입
    const elapsed = Math.min((Date.now() - (S.lastSave || Date.now())) / 1000, 8 * 3600);
    const off = perSec() * elapsed * 0.5;
    if (off > 0) {
      S.coins += off; S.totalEarned += off;
      setTimeout(() => toast(`오프라인 보상 +${fmt(off)} 코인`), 600);
    }
  } catch (e) {}
}

// ====== 토스트 ======
let toastTimer = null;
const toastEl = document.getElementById('toast');
function toast(msg) {
  toastEl.textContent = msg;
  toastEl.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => toastEl.classList.remove('show'), 2200);
}

// ====== 별 배경 ======
(function makeStars() {
  const wrap = document.getElementById('stars');
  let html = '';
  for (let i = 0; i < 70; i++) {
    const x = Math.random() * 100, y = Math.random() * 100;
    const d = (Math.random() * 3).toFixed(2), s = (1 + Math.random() * 1.5).toFixed(1);
    html += `<div class="star" style="left:${x}%;top:${y}%;animation-delay:${d}s;width:${s}px;height:${s}px"></div>`;
  }
  wrap.innerHTML = html;
})();

// ====== 뉴스 ======
(function rotateNews() {
  const el = document.getElementById('newsText');
  let i = 0;
  function show() { el.textContent = '🥟 ' + NEWS[i % NEWS.length]; i++; }
  show();
  setInterval(show, 18000);
})();

// ====== 캔버스 (딤섬 캐릭터 + 이펙트) ======
const canvas = document.getElementById('char');
const ctx = canvas.getContext('2d');
const stage = document.getElementById('stage');
let CW = 0, CH = 0, DPR = Math.max(1, Math.min(2, window.devicePixelRatio || 1));

function resizeCanvas() {
  CW = stage.clientWidth; CH = stage.clientHeight;
  canvas.width = CW * DPR; canvas.height = CH * DPR;
  ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
}
window.addEventListener('resize', resizeCanvas);

let squash = 1;
let floaters = [];
let stars = [];
let t = 0;

function drawDumpling(cx, cy, scale, sq) {
  const w = 150 * scale, h = w * 0.78;
  ctx.save();
  ctx.translate(cx, cy);
  ctx.scale(1 + (1 - sq) * 0.5, sq);

  // 바닥 그림자
  ctx.fillStyle = 'rgba(0,0,0,0.25)';
  ctx.beginPath();
  ctx.ellipse(0, h * 0.46, w * 0.46, h * 0.12, 0, 0, Math.PI * 2);
  ctx.fill();

  // 몸통 그림자
  ctx.fillStyle = '#f0d6ad';
  ctx.beginPath();
  ctx.ellipse(0, h * 0.06, w * 0.5, h * 0.46, 0, 0, Math.PI * 2);
  ctx.fill();
  // 몸통
  ctx.fillStyle = '#fff4dd';
  ctx.beginPath();
  ctx.ellipse(0, 0, w * 0.48, h * 0.44, 0, 0, Math.PI * 2);
  ctx.fill();

  // 주름(꼭지)
  ctx.strokeStyle = '#e7caa0';
  ctx.lineWidth = Math.max(2, w * 0.02);
  ctx.lineCap = 'round';
  for (let i = -2; i <= 2; i++) {
    ctx.beginPath();
    ctx.moveTo(i * w * 0.07, -h * 0.42);
    ctx.quadraticCurveTo(i * w * 0.15, -h * 0.2, i * w * 0.2, -h * 0.02);
    ctx.stroke();
  }
  ctx.fillStyle = '#e7caa0';
  ctx.beginPath();
  ctx.ellipse(0, -h * 0.44, w * 0.09, h * 0.06, 0, 0, Math.PI * 2);
  ctx.fill();

  // 볼터치
  ctx.fillStyle = 'rgba(255,140,160,0.45)';
  ctx.beginPath();
  ctx.ellipse(-w * 0.24, h * 0.08, w * 0.07, h * 0.05, 0, 0, Math.PI * 2);
  ctx.ellipse(w * 0.24, h * 0.08, w * 0.07, h * 0.05, 0, 0, Math.PI * 2);
  ctx.fill();

  // 눈
  ctx.fillStyle = '#4b3829';
  ctx.beginPath();
  ctx.arc(-w * 0.15, -h * 0.02, w * 0.035, 0, Math.PI * 2);
  ctx.arc(w * 0.15, -h * 0.02, w * 0.035, 0, Math.PI * 2);
  ctx.fill();
  // 눈 하이라이트
  ctx.fillStyle = '#fff';
  ctx.beginPath();
  ctx.arc(-w * 0.135, -h * 0.04, w * 0.012, 0, Math.PI * 2);
  ctx.arc(w * 0.165, -h * 0.04, w * 0.012, 0, Math.PI * 2);
  ctx.fill();
  // 입
  ctx.strokeStyle = '#4b3829';
  ctx.lineWidth = Math.max(1.5, w * 0.016);
  ctx.beginPath();
  ctx.arc(0, h * 0.02, w * 0.05, 0.15 * Math.PI, 0.85 * Math.PI);
  ctx.stroke();

  ctx.restore();
}

function spawnClickFx(power) {
  const cx = CW / 2 + (Math.random() - 0.5) * 60;
  const cy = CH / 2 - 40;
  floaters.push({ x: cx, y: cy, vy: -70, life: 1, text: '+' + fmt(power) });
  const n = 5 + Math.floor(Math.random() * 3);
  for (let i = 0; i < n; i++) {
    const a = Math.random() * Math.PI * 2, sp = 80 + Math.random() * 120;
    stars.push({ x: CW / 2, y: CH / 2, vx: Math.cos(a) * sp, vy: Math.sin(a) * sp - 40, life: 1, rot: Math.random() * 6, vr: (Math.random() - 0.5) * 10, sz: 8 + Math.random() * 8 });
  }
}

function drawStar(x, y, r, rot) {
  ctx.save();
  ctx.translate(x, y);
  ctx.rotate(rot);
  ctx.beginPath();
  for (let i = 0; i < 5; i++) {
    const a = (Math.PI * 2 / 5) * i - Math.PI / 2;
    ctx.lineTo(Math.cos(a) * r, Math.sin(a) * r);
    const a2 = a + Math.PI / 5;
    ctx.lineTo(Math.cos(a2) * r * 0.45, Math.sin(a2) * r * 0.45);
  }
  ctx.closePath();
  ctx.fill();
  ctx.restore();
}

function renderCanvas(dt) {
  ctx.clearRect(0, 0, CW, CH);
  squash += (1 - squash) * Math.min(1, dt * 12);
  const bob = Math.sin(t * 2) * 6;
  const sc = Math.min(CW, CH) / 240;
  drawDumpling(CW / 2, CH / 2 + bob, sc, squash);

  // 별 파티클
  for (const s of stars) {
    s.vy += 260 * dt; s.x += s.vx * dt; s.y += s.vy * dt; s.rot += s.vr * dt; s.life -= dt * 1.3;
    ctx.fillStyle = `rgba(255,210,74,${Math.max(0, s.life)})`;
    drawStar(s.x, s.y, s.sz, s.rot);
  }
  stars = stars.filter(s => s.life > 0);

  // 떠오르는 숫자
  for (const f of floaters) {
    f.y += f.vy * dt; f.vy *= 0.96; f.life -= dt * 1.1;
    ctx.globalAlpha = Math.max(0, f.life);
    ctx.fillStyle = '#ffe89a';
    ctx.font = `bold ${Math.round(24 * sc)}px -apple-system, sans-serif`;
    ctx.textAlign = 'center';
    ctx.fillText(f.text, f.x, f.y);
    ctx.globalAlpha = 1;
  }
  floaters = floaters.filter(f => f.life > 0);
}

// ====== 클릭 ======
function doClick() {
  const power = clickPower() * combo;
  S.coins += power; S.totalEarned += power; S.totalClicks++;
  squash = 0.74;
  combo = Math.min(2.5, combo + 0.03);
  comboDecay = 1.2;
  spawnClickFx(power);
  popCoins();
}
stage.addEventListener('pointerdown', (e) => { e.preventDefault(); doClick(); });
window.addEventListener('keydown', (e) => {
  if (e.code === 'Space') { e.preventDefault(); doClick(); }
});

// ====== 코인 표시 팝 ======
const coinsEl = document.getElementById('coins');
function popCoins() { coinsEl.classList.remove('pop'); void coinsEl.offsetWidth; coinsEl.classList.add('pop'); }

// ====== 상점 UI ======
const tabsEl = document.getElementById('tabs');
const buyModesEl = document.getElementById('buyModes');
const itemsEl = document.getElementById('items');
const statsEl = document.getElementById('stats');

const TABS = [
  { id: 'friends', label: '친구들' },
  { id: 'upgrade', label: '강화' },
  { id: 'achieve', label: '업적' },
  { id: 'rebirth', label: '환생' },
  { id: 'room', label: '방' },
  { id: 'summon', label: '소환' },
];

function buildTabs() {
  tabsEl.innerHTML = '';
  TABS.forEach(tb => {
    const b = document.createElement('button');
    b.className = 'tab' + (tb.id === activeTab ? ' active' : '');
    b.textContent = tb.label;
    b.onclick = () => { activeTab = tb.id; buildTabs(); buildItems(); };
    tabsEl.appendChild(b);
  });
  buyModesEl.style.display = activeTab === 'friends' ? 'flex' : 'none';
}

function buildBuyModes() {
  buyModesEl.innerHTML = '';
  [['x1', 1], ['x10', 10], ['MAX', 'MAX']].forEach(([label, val]) => {
    const b = document.createElement('button');
    b.className = 'bm' + (buyMode === val ? ' active' : '');
    b.textContent = label;
    b.onclick = () => { buyMode = val; buildBuyModes(); refreshItems(); };
    buyModesEl.appendChild(b);
  });
}

let itemRefs = [];
function buildItems() {
  itemsEl.innerHTML = '';
  itemRefs = [];
  if (activeTab === 'friends') {
    GENS.forEach((g, i) => {
      const el = document.createElement('div');
      el.className = 'item';
      el.innerHTML = `
        <div class="emoji">${g.emoji}</div>
        <div class="body">
          <div class="name"><span>${g.name}</span><span class="cnt"></span></div>
          <div class="desc">${g.desc}</div>
          <div class="cost"></div>
        </div>`;
      el.onclick = () => buyGen(i);
      itemsEl.appendChild(el);
      itemRefs.push({ el, type: 'gen', i, cnt: el.querySelector('.cnt'), cost: el.querySelector('.cost') });
    });
  } else if (activeTab === 'upgrade') {
    const el = document.createElement('div');
    el.className = 'item';
    el.innerHTML = `
      <div class="emoji">✊</div>
      <div class="body">
        <div class="name"><span>클릭 강화</span><span class="cnt"></span></div>
        <div class="desc">클릭당 코인이 +1 늘어나요</div>
        <div class="cost"></div>
      </div>`;
    el.onclick = () => buyClickUpgrade();
    itemsEl.appendChild(el);
    itemRefs.push({ el, type: 'click', cnt: el.querySelector('.cnt'), cost: el.querySelector('.cost') });
  } else {
    const p = document.createElement('div');
    p.className = 'placeholder';
    p.textContent = '곧 만나요! 🥟 (준비 중인 기능이에요)';
    itemsEl.appendChild(p);
  }
  refreshItems();
}

function refreshItems() {
  for (const r of itemRefs) {
    if (r.type === 'gen') {
      const owned = S.gens[r.i];
      const k = buyMode === 'MAX' ? Math.max(1, maxBuy(r.i)) : buyMode;
      const cost = costOf(r.i, buyMode === 'MAX' ? Math.max(1, maxBuy(r.i)) : k);
      const afford = maxBuy(r.i) >= (buyMode === 'MAX' ? 1 : k) && (buyMode !== 'MAX' || maxBuy(r.i) >= 1);
      r.cnt.textContent = owned;
      const buyN = buyMode === 'MAX' ? maxBuy(r.i) : k;
      r.cost.textContent = `🪙 ${fmt(cost)}${buyMode !== 1 ? `  (${buyMode === 'MAX' ? buyN : k}개)` : ''}`;
      const can = (buyMode === 'MAX') ? maxBuy(r.i) >= 1 : maxBuy(r.i) >= k;
      r.cost.classList.toggle('no', !can);
      r.el.classList.toggle('afford', can);
      r.el.classList.toggle('locked', !can && owned === 0 && S.coins < genCost(r.i, 0));
    } else if (r.type === 'click') {
      r.cnt.textContent = 'Lv.' + S.clickLevel;
      const c = clickUpgradeCost();
      r.cost.textContent = `🪙 ${fmt(c)}`;
      const can = S.coins >= c;
      r.cost.classList.toggle('no', !can);
      r.el.classList.toggle('afford', can);
    }
  }
}

function buyGen(i) {
  const affordable = maxBuy(i);
  const k = buyMode === 'MAX' ? affordable : Math.min(buyMode, affordable);
  if (k <= 0) return;
  const cost = costOf(i, k);
  if (S.coins < cost) return;
  S.coins -= cost; S.gens[i] += k;
  refreshItems();
}

function buyClickUpgrade() {
  const c = clickUpgradeCost();
  if (S.coins < c) return;
  S.coins -= c; S.clickLevel++;
  refreshItems();
}

// ====== HUD 갱신 ======
const levelNameEl = document.getElementById('levelName');
const progressBar = document.getElementById('progressBar');
const progressText = document.getElementById('progressText');
const persecEl = document.getElementById('persec');
const comboEl = document.getElementById('combo');
let lastLevel = 1;

function updateHUD() {
  coinsEl.textContent = fmt(S.coins);
  const ps = perSec();
  persecEl.textContent = `초당 ${fmt(ps)} 코인`;
  const li = levelInfo();
  if (li.lvl !== lastLevel) {
    if (li.lvl > lastLevel) toast(`🎉 Lv.${li.lvl} 달성!`);
    lastLevel = li.lvl;
  }
  const name = LEVEL_NAMES[Math.min(LEVEL_NAMES.length - 1, li.lvl - 1)];
  levelNameEl.textContent = `Lv.${li.lvl} ${name}`;
  const pct = Math.min(100, (li.cur / li.need) * 100);
  progressBar.style.width = pct + '%';
  progressText.textContent = `Lv.${li.lvl + 1}까지 ${fmt(li.need - li.cur)} 코인 (${pct.toFixed(1)}%)`;
  comboEl.textContent = `🔥 클릭 x${combo.toFixed(1)}`;
  statsEl.innerHTML = `총 클릭 <b>${S.totalClicks}</b> · 누적 코인 <b>${fmt(S.totalEarned)}</b><br>클릭당 <b>${fmt(clickPower())}</b> 코인 · 초당 <b>${fmt(ps)}</b>`;
}

// ====== 메인 루프 ======
let lastT = performance.now();
function loop(now) {
  const dt = Math.min(0.05, (now - lastT) / 1000);
  lastT = now; t += dt;

  const ps = perSec();
  if (ps > 0) { const g = ps * dt; S.coins += g; S.totalEarned += g; }

  if (comboDecay > 0) { comboDecay -= dt; if (comboDecay <= 0) combo = Math.max(1, combo - 0.5); }
  else if (combo > 1) combo = Math.max(1, combo - dt * 0.4);

  renderCanvas(dt);
  updateHUD();
  refreshItems();
  requestAnimationFrame(loop);
}

// ====== 시작 ======
load();
resizeCanvas();
buildTabs();
buildBuyModes();
buildItems();
requestAnimationFrame(loop);
setInterval(save, 5000);
window.addEventListener('beforeunload', save);

})();
</script>
</body>
