  <style>
    /* React 마운트 전 정적 스플래시 (마운트되면 통째로 교체됨) */
    html, body { height: 100%; margin: 0; background: #F6F5F0; }
    .boot-splash {
      position: fixed; inset: 0; display: flex; flex-direction: column;
      align-items: center; justify-content: center; background: #F6F5F0;
      font-family: 'Helvetica Neue', Helvetica, -apple-system, BlinkMacSystemFont,
        'Apple SD Gothic Neo', 'Pretendard', Arial, sans-serif;
    }
    .boot-dance { transform-origin: 50% 100%; animation: boot-dance 1.3s ease-in-out infinite; }
    @keyframes boot-dance {
      0%   { transform: translate(0, 0) rotate(0deg) scale(1.05, .92); }
      12%  { transform: translate(-7px, -18px) rotate(-8deg) scale(.94, 1.08); }
      25%  { transform: translate(0, 0) rotate(0deg) scale(1.1, .88); }
      37%  { transform: translate(7px, -18px) rotate(8deg) scale(.94, 1.08); }
      50%  { transform: translate(0, 0) rotate(0deg) scale(1.05, .92); }
      62%  { transform: translate(0, -10px) rotate(-5deg) scale(.97, 1.05); }
      75%  { transform: translate(0, 0) rotate(4deg) scale(1.07, .9); }
      87%  { transform: translate(0, -10px) rotate(5deg) scale(.97, 1.05); }
      100% { transform: translate(0, 0) rotate(0deg) scale(1.05, .92); }
    }
    .boot-shadow {
      width: 84px; height: 11px; margin-top: -2px; border-radius: 50%;
      background: rgba(67, 53, 38, 0.13);
      animation: boot-shadow 1.3s ease-in-out infinite;
    }
    @keyframes boot-shadow {
      0%, 25%, 50%, 75%, 100% { transform: scaleX(1.12); opacity: 1; }
      12%, 37%, 62%, 87%      { transform: scaleX(.66); opacity: .55; }
    }
    .boot-brand {
      margin-top: 26px; font-family: 'Space Mono', ui-monospace, monospace;
      font-size: 12px; letter-spacing: 0.34em; padding-left: 0.34em; color: #B4B0A4;
    }
  </style>
